<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaceWave Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@600&family=Merriweather:wght@400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0c10; --text:#eef2f7; --muted:#a3adbb;
  --accent:#8A2BE2; --accent-2:#a78bfa; --glass:rgba(255,255,255,0.08);
  --radius:20px; --maxw:780px;
}
:root.light{--bg:#f8fafc; --text:#0f172a; --muted:#64748b; --glass:rgba(255,255,255,0.85);}
:root.sepia{--bg:#f4ecd8; --text:#3e2f1c; --muted:#7a6a55; --glass:rgba(255,255,255,0.6);}

body{font-family:Inter,sans-serif;background:radial-gradient(900px 500px at 85% -10%, rgba(138,43,226,0.22), transparent 60%), var(--bg);color:var(--text);transition:.4s}
.topbar{position:sticky;top:0;backdrop-filter:blur(14px);background:var(--glass);border-bottom:1px solid rgba(255,255,255,0.1);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;z-index:50}
.progress{height:4px;background:rgba(255,255,255,0.1);position:sticky;top:62px}
.progress > div{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .15s}
.wrap{max-width:var(--maxw);margin:36px auto;padding:0 20px}
.meta{display:flex;gap:16px;margin-bottom:20px;align-items:center}
.meta img{width:60px;height:80px;object-fit:cover;border-radius:8px}
.reader{background:var(--glass);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:42px;box-shadow:0 18px 40px rgba(0,0,0,0.25)}
.reader p{font-size:1.18rem;line-height:1.9;margin-bottom:1.2em;max-width:70ch}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}
.ctrl{padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);background:var(--glass);color:var(--text);cursor:pointer;font-weight:500}
.ctrl:hover{transform:translateY(-2px)}
select{background:var(--glass);border:1px solid rgba(255,255,255,0.15);color:var(--text);padding:10px;border-radius:12px}
.highlight{background:rgba(138,43,226,0.3);cursor:pointer}
@media(max-width:640px){.reader{padding:24px}.reader p{font-size:1.08rem}}
</style>
</head>
<body>

<div class="topbar">
  <div style="font-family:Playfair Display;font-weight:700;font-size:1.3rem">PaceWave</div>
  <div style="display:flex;gap:8px;align-items:center">
    <select onchange="changeFont(this.value)">
      <option value="Inter">Inter</option>
      <option value="Playfair Display">Playfair</option>
      <option value="Merriweather">Merriweather</option>
    </select>
    <button class="ctrl" onclick="cycleTheme()">🌓</button>
    <a href="index.html" class="ctrl">← Library</a>
  </div>
</div>

<div class="progress"><div id="progressBar"></div></div>

<main class="wrap">
  <div class="meta">
    <img id="bookCover" src="" alt="">
    <div>
      <h1 id="bookTitle" style="font-family:Playfair Display;font-size:2rem">Loading...</h1>
      <p id="bookAuthor" style="color:var(--muted)"></p>
      <p id="readTime" style="color:var(--muted);font-size:.9rem"></p>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl" onclick="changeFontSize(-0.1)">A−</button>
    <button class="ctrl" onclick="changeFontSize(0.1)">A+</button>
    <button class="ctrl" onclick="toggleBookmark()">🔖 Bookmark</button>
    <button class="ctrl" onclick="window.scrollTo({top:0,behavior:'smooth'})">Top ↑</button>
  </div>

  <article class="reader" id="content"></article>
</main>

<script>
let fontSize = 1.18;
const params = new URLSearchParams(location.search);
const bookId = params.get('id') || 'demo';

document.getElementById('bookTitle').innerText = params.get('title') || 'Book Title';
document.getElementById('bookAuthor').innerText = 'by ' + (params.get('author') || 'Author');
document.getElementById('bookCover').src = params.get('cover') || '';
document.getElementById('content').innerText = decodeURIComponent(params.get('content') || 'No content loaded.');

// Est read time
const words = document.getElementById('content').innerText.split(' ').length;
document.getElementById('readTime').innerText = Math.ceil(words/200) + ' min read';

// Progress bar + save position
addEventListener('scroll', () => {
  const h = document.documentElement.scrollHeight - innerHeight;
  const pct = h > 0 ? (scrollY / h) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  localStorage.setItem('pw_pos_' + bookId, scrollY);
});

// Font + theme
function changeFontSize(d){fontSize=Math.max(0.95,Math.min(1.7,fontSize+d));document.getElementById('content').style.fontSize=fontSize+'rem';localStorage.setItem('pw_font',fontSize)}
function changeFont(f){document.getElementById('content').style.fontFamily=f;localStorage.setItem('pw_fontface',f)}
function cycleTheme(){
  const modes = ['','light','sepia'];
  const current = modes.indexOf(document.documentElement.className);
  document.documentElement.className = modes[(current+1)%3];
  localStorage.setItem('pw_theme', document.documentElement.className);
}
function toggleBookmark(){
  const key = 'pw_bm_' + bookId;
  localStorage.getItem(key) ? localStorage.removeItem(key) : localStorage.setItem(key, scrollY);
  alert(localStorage.getItem(key) ? 'Bookmarked' : 'Bookmark removed');
}

// Load prefs
window.onload = () => {
  document.documentElement.className = localStorage.getItem('pw_theme') || '';
  fontSize = parseFloat(localStorage.getItem('pw_font')) || 1.18;
  document.getElementById('content').style.fontSize = fontSize + 'rem';
  document.getElementById('content').style.fontFamily = localStorage.getItem('pw_fontface') || 'Inter';
  const savedPos = localStorage.getItem('pw_pos_' + bookId);
  if(savedPos && confirm('Resume from last position?')) scrollTo(0, parseInt(savedPos));
}
</script>
</body>
</html>
